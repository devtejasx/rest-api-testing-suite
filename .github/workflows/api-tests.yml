name: API Tests

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: api-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: Newman API tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 2. Install dependencies (provides newman + reporters)
      - name: Install dependencies
        run: npm ci

      # 3. Start Docker Compose (PostgreSQL + backend)
      - name: Start database and backend
        run: docker compose up -d --build db backend

      # 4. Wait for backend availability
      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend at http://localhost:8080/api/health …"
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8080/api/health > /dev/null; then
              echo "Backend is up."
              exit 0
            fi
            sleep 3
          done
          echo "Backend did not become healthy in time — dumping logs:"
          docker compose logs backend
          exit 1

      # 5. Run database migrations (explicit; idempotent — the entrypoint has
      #    already applied them, this makes the step visible and re-runnable).
      - name: Run database migrations
        run: docker compose exec -T backend npx prisma migrate deploy

      # 6. Seed the database (ensures a deterministic dataset before tests)
      - name: Seed database
        run: docker compose exec -T backend node dist/seed/run.js

      # 7. Backend is already running (started in step 3); confirm health again.
      - name: Confirm backend is serving
        run: curl -fs http://localhost:8080/api/health

      # 7b. Backend integration tests (Jest + Supertest) against the live DB.
      - name: Run backend integration tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rats?schema=public
          JWT_SECRET: ci-integration-test-secret
          SEED_ADMIN_EMAIL: admin@rats.dev
          SEED_ADMIN_PASSWORD: Admin@12345
        run: |
          npm ci
          npx prisma generate
          npm run test:coverage

      # 8. Run Newman (fails the job on any failed assertion — step 10)
      - name: Run Newman API tests
        run: npm run test:api

      # 9. Upload HTML + JUnit reports (always, so failures are inspectable)
      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs backend

      - name: Tear down
        if: always()
        run: docker compose down -v
